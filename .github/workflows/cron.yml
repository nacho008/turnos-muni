name: Run Cron Job

on:
  schedule:
    - cron: "*/1 * * * *"  # same as node-cron
  workflow_dispatch:      # allows manual trigger

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run job
        run: node src/github-cron.js